name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  install:
    name: Installation des dépendances
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Restaurer le cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: Installer les dépendances
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

  format-lint:
    name: Formatage & Lint
    runs-on: ubuntu-latest
    needs: [install]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Restaurer le cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: Vérifier le formatage (Prettier)
        run: npm run format:check

      - name: Analyser le code (ESLint + SonarJS)
        run: npm run lint

  tests:
    name: Tests unitaires
    runs-on: ubuntu-latest
    needs: [format-lint]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Restaurer le cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: Lancer les tests avec couverture
        run: npm run test:ci

  tests-e2e:
    name: Tests E2E (Supertest)
    runs-on: ubuntu-latest
    needs: [tests]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Restaurer le cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: Lancer les tests E2E
        run: npm run test:e2e
        env:
          DATABASE_URL: ':memory:'

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [tests-e2e]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Restaurer le cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: Compiler l'application
        run: npm run build

      - name: Sauvegarder le build
        uses: actions/upload-artifact@v4
        with:
          name: build-dist
          path: dist/

  security:
    name: Scan de sécurité (Trivy)
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - uses: actions/checkout@v4

      - name: Installer Trivy
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b .

      - name: Scanner les dépendances npm
        run: ./trivy fs --exit-code 0 --severity CRITICAL,HIGH --no-progress .

  # ---------------------------------------------------------------------------
  # EXERCICE 1 : Ajouter un job "release" ici
  # Ce job doit :
  #   - Dependre du job "security"
  #   - S'executer uniquement sur la branche main
  #   - Checkout avec fetch-depth: 0 pour lire l'historique et les tags
  #   - Configurer git user.name et git user.email
  #   - Lancer npx commit-and-tag-version
  # Avec act, le commit et le tag crees par ce job restent dans le runner
  # ephemere. Lancez npx commit-and-tag-version localement avant de recoder.
  # ---------------------------------------------------------------------------

  # ---------------------------------------------------------------------------
  # EXERCICE 2 : Ajouter un job "publish-npm" ici
  # Ce job doit :
  #   - Dependre du job "release"
  #   - S'executer uniquement sur la branche main
  #   - Telecharger l'artefact build-dist dans dist/
  #   - Configurer l'authentification npm minimale pour Verdaccio
  #   - Publier vers http://localhost:4873
  # Si Verdaccio refuse une version deja publiee, nettoyez le registre local
  # avec les commandes donnees dans EXERCICE.md.
  # ---------------------------------------------------------------------------

  # ---------------------------------------------------------------------------
  # EXERCICE 3 : Ajouter un job "publish-docker" ici
  # Ce job doit :
  #   - Dependre du job "release"
  #   - S'executer uniquement sur la branche main
  #   - Telecharger l'artefact build-dist dans dist/
  #   - Construire l'image Docker de l'API
  #   - Taguer et pousser vers localhost:5000/tp-cd-github-flow:<version>
  # Le TP demande de verifier que le tag Docker n'existe pas deja avant le push.
  # ---------------------------------------------------------------------------
